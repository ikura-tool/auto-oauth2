<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:site_name" content="ikura tool lol">
    <meta property="og:title" content="Discord Auto Oauth2 Tool">
    <meta property="og:description" content="Auto Oauth2 by Token">
    <meta property="og:type" content="website">
    <title>Discord Auto Oauth2</title>
    <style>
        :root {
            --bg: #050508;
            --container-bg: #0d0d16;
            --neon-pink: #ff007a;
            --neon-blue: #00f2ff;
            --neon-green: #39ff14;
            --text: #c0c0c0;
            --border: #1f1f33;
        }

        body {
            margin: 0; padding: 20px;
            font-family: 'Segoe UI', 'Consolas', monospace;
            background: var(--bg);
            background-image: linear-gradient(rgba(10, 10, 20, 0.8) 50%, rgba(0, 0, 0, 0) 50%),
                              linear-gradient(90deg, rgba(255, 0, 122, 0.05), rgba(0, 242, 255, 0.05));
            background-size: 100% 4px, 100% 100%;
            color: var(--text);
            display: flex; justify-content: center; min-height: 100vh;
        }

        .container {
            background: var(--container-bg);
            border: 2px solid var(--border);
            padding: 30px;
            border-radius: 5px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), 0 0 10px var(--border);
            width: 100%; max-width: 900px;
            position: relative; overflow: hidden;
            box-sizing: border-box;
        }

        .container::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-pink), transparent);
        }

        h2 {
            text-align: center; color: var(--neon-blue);
            text-transform: uppercase; letter-spacing: 4px;
            text-shadow: 0 0 15px var(--neon-blue); margin-bottom: 30px;
            font-size: 1.5rem;
        }

        label {
            display: block; margin-top: 15px; font-size: 0.75em;
            color: var(--neon-pink); text-transform: uppercase; letter-spacing: 2px;
        }

        textarea, input {
            width: 100%; padding: 12px;
            border: 1px solid var(--border);
            background: #000; color: #fff;
            border-radius: 3px; box-sizing: border-box; outline: none;
            transition: 0.2s; margin-top: 5px;
            font-family: 'Consolas', monospace;
        }

        textarea:focus, input:focus { 
            border-color: var(--neon-blue); 
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); 
        }

        .status-panel {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.3);
            display: none;
        }

        .progress-bar-container {
            width: 100%; height: 4px; background: #111; margin-top: 10px;
        }

        .progress-bar {
            height: 100%; width: 0%; background: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);
            transition: width 0.3s ease;
        }

        button {
            width: 100%; padding: 15px; border: none; cursor: pointer;
            font-weight: bold; transition: 0.3s; margin-top: 20px;
            text-transform: uppercase; letter-spacing: 3px;
        }

        button:disabled {
            background: #222 !important; color: #555 !important;
            box-shadow: none !important; cursor: not-allowed;
        }

        .btn-start {
            background: var(--neon-blue); color: #000;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .btn-start:hover:not(:disabled) { 
            background: #fff; box-shadow: 0 0 25px #fff; 
        }

        .log-section {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px;
        }

        .log-container {
            background: #000; border: 1px solid var(--border);
            display: flex; flex-direction: column;
        }

        .log-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 10px; border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
        }

        .log-header h3 { margin: 0; font-size: 0.7em; letter-spacing: 1px; }
        .success-title { color: var(--neon-green); }
        .error-title { color: var(--neon-pink); }

        .copy-btn {
            width: auto; margin: 0; padding: 4px 8px; font-size: 10px;
            background: transparent; border: 1px solid var(--border); color: var(--text);
            letter-spacing: 1px;
        }

        .copy-btn:hover { background: var(--border); }

        .log-box {
            height: 250px; overflow-y: auto; padding: 10px;
            font-size: 0.7em; font-family: 'Consolas', monospace;
            line-height: 1.6;
        }

        .log-entry { margin-bottom: 4px; word-break: break-all; }
        .log-success { color: var(--neon-green); }
        .log-error { color: var(--neon-pink); text-shadow: 0 0 5px rgba(255, 0, 64, 0.2); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); }
        
        @media (max-width: 600px) {
            .log-section { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Discord Auto Oauth2</h2>

    <label for="app-id">OAuth2 Verification url</label>
    <input type="text" id="app-id" placeholder="Enter Cliend id or oauth2 url">

    <label for="user-tokens">User Tokens</label>
    <textarea id="user-tokens" placeholder="MTQzNzc0..."></textarea>

    <button id="execute-auth" class="btn-start" disabled>Start</button>

    <div id="status-panel" class="status-panel">
        <div id="status-text" style="font-size: 0.75em; color: var(--neon-blue);">Ready...</div>
        <div class="progress-bar-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
    </div>

    <div class="log-section">
        <div class="log-container">
            <div class="log-header">
                <h3 class="success-title">Success <span id="success-count">(0)</span></h3>
                <button class="copy-btn" data-target="success-log">Copy</button>
            </div>
            <div id="success-log" class="log-box"></div>
        </div>
        <div class="log-container">
            <div class="log-header">
                <h3 class="error-title">Failed <span id="fail-count">(0)</span></h3>
                <button class="copy-btn" data-target="fail-log">Copy</button>
            </div>
            <div id="fail-log" class="log-box"></div>
        </div>
    </div>
</div>

<script>
class OAuthAuthorizer {
    constructor() {
        this.appIdInput = document.getElementById('app-id');
        this.tokensInput = document.getElementById('user-tokens');
        this.executeBtn = document.getElementById('execute-auth');
        this.statusPanel = document.getElementById('status-panel');
        this.statusText = document.getElementById('status-text');
        this.progressBar = document.getElementById('progress-bar');
        
        this.successLog = document.getElementById('success-log');
        this.failLog = document.getElementById('fail-log');
        this.successCountEl = document.getElementById('success-count');
        this.failCountEl = document.getElementById('fail-count');
        
        this.isExecuting = false;
        this.successCount = 0;
        this.failCount = 0;
        
        this.initEventListeners();
    }

    initEventListeners() {
        this.executeBtn.addEventListener('click', () => this.execute());
        [this.appIdInput, this.tokensInput].forEach(el => {
            el.addEventListener('input', () => this.updateButtonState());
        });
        document.querySelectorAll('.copy-btn').forEach(btn => {
            btn.addEventListener('click', (e) => this.handleCopy(e));
        });
    }
    
    handleCopy(e) {
        const targetId = e.target.getAttribute('data-target');
        const logBox = document.getElementById(targetId);
        const tokens = [...logBox.querySelectorAll('.log-entry')].map(en => en.dataset.token).join('\n');
        
        if (tokens) {
            navigator.clipboard.writeText(tokens);
            const originalText = e.target.textContent;
            e.target.textContent = 'Done';
            setTimeout(() => e.target.textContent = originalText, 1000);
        }
    }

    updateButtonState() {
        const appId = this.appIdInput.value.trim();
        const tokens = this.tokensInput.value.trim();
        this.executeBtn.disabled = !appId || !tokens || this.isExecuting;
        this.executeBtn.textContent = this.isExecuting ? 'Verifying...' : 'Start Auto Oauth2';
    }
    
    log(type, token, message = '') {
        const container = type === 'success' ? this.successLog : this.failLog;
        const entry = document.createElement('div');
        entry.className = `log-entry ${type === 'success' ? 'log-success' : 'log-error'}`;
        entry.dataset.token = token;
        
        const truncatedToken = `${token.substring(0, 12)}...`;
        entry.textContent = `[${truncatedToken}] ${message}`;
        
        container.appendChild(entry);
        container.scrollTop = container.scrollHeight;
        
        if (type === 'success') {
            this.successCount++;
            this.successCountEl.textContent = `(${this.successCount})`;
        } else {
            this.failCount++;
            this.failCountEl.textContent = `(${this.failCount})`;
        }
    }

    async authorize(token, clientId) {
        try {
            const response = await fetch(`https://discord.com/api/v9/oauth2/authorize?client_id=${clientId}&scope=applications.commands`, {
                method: 'POST',
                headers: { 'Authorization': token, 'Content-Type': 'application/json' },
                body: JSON.stringify({ permissions: "0", authorize: true, integration_type: 1 })
            });

            const data = await response.json();
            if (response.ok) {
                this.log('Success', token, 'Authorized');
            } else {
                const msg = data.code === 50199 ? 'Not supported' : (data.message || 'Erorr');
                this.log('Error', token, msg);
            }
        } catch (e) {
            this.log('Error', token, 'Fetch failed');
        }
    }

    async execute() {
        const rawAppId = this.appIdInput.value.trim();
        const match = rawAppId.match(/(?:client_id=)?(\d{17,20})/);
        const clientId = match ? match[1] : null;

        if (!clientId) {
            alert('INVALID CLIENT ID');
            return;
        }

        this.isExecuting = true;
        this.updateButtonState();
        this.statusPanel.style.display = 'block';
        
        this.successLog.innerHTML = '';
        this.failLog.innerHTML = '';
        this.successCount = 0;
        this.failCount = 0;
        this.successCountEl.textContent = '(0)';
        this.failCountEl.textContent = '(0)';

        const tokens = this.tokensInput.value.trim().split('\n').filter(Boolean);
        const total = tokens.length;

        for (let i = 0; i < total; i++) {
            this.statusText.textContent = `PROCESSING: ${i + 1} / ${total}`;
            this.progressBar.style.width = `${((i + 1) / total) * 100}%`;
            
            await this.authorize(tokens[i], clientId);
            if (i < total - 1) await new Promise(r => setTimeout(r, 400));
        }
        
        this.statusText.textContent = 'SEQUENCE COMPLETED';
        this.isExecuting = false;
        this.updateButtonState();
    }
}

document.addEventListener('DOMContentLoaded', () => new OAuthAuthorizer());
</script>

</body>
</html>
